<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Pilgrim Viewer — View .pilgrim and .gpx walk files</title>

    <meta name="author" content="Walk Talk Meditate" />
    <meta name="theme-color" content="#F5F0E8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1914" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pilgrim Viewer" />
    <meta property="og:description" content="View .pilgrim and .gpx walk files in your browser. Routes, stats, elevation, weather, transcriptions — your data never leaves your device." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:image" content="https://view.pilgrimapp.org/og-image.png" />

    <link rel="canonical" href="https://view.pilgrimapp.org" />

      rel="stylesheet"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
      rel="stylesheet"
