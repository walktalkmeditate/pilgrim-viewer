<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1C1914"/>

  <!-- Walking staff — the pilgrim's mark -->
  <path d="M560 140 C575 220, 600 340, 640 480" stroke="#8B7355" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <circle cx="558" cy="136" r="3" fill="#8B7355" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="300" font-style="italic" fill="#F0EBE1" opacity="0.9">Pilgrim Viewer</text>

  <!-- Divider -->
  <line x1="480" y1="330" x2="720" y2="330" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#B8AFA2" letter-spacing="3">.PILGRIM &amp; .GPX WALK FILES</text>

  <!-- Privacy -->
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#6B6359">Your data stays on your device</text>

  <!-- Open source badge -->
  <text x="600" y="560" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#6B6359" letter-spacing="2">OPEN SOURCE · MIT LICENSE</text>
</svg>
